<p>The 8 best 3rd place teams qualify for the round of 32. Teams with matches still to be played are highlighted:</p>

<table class="ranking bestThirds">
<thead>
	<tr>
		<th>Team</th>
		<th>Group</th>
		<th>Points</th>
		<th title="Goal Difference">Diff.</th>
		<th title="Goals Scored">GS</th>
		<th title="Matches played">MP</th>
	</tr>
</thead>
<tbody>
	<!-- BEGIN: team -->
	<tr class="{row_class}{highlighted}">
		<td class="team"><span class="{flag} {flag}-{team.id}">{team.name}</span></td>
		<td>{team.group}</td>
		<td>{team.points}</td>
		<td>{team.goal_difference}</td>
		<td>{team.goals_scored}</td>
		<td>{team.played}</td>
	</tr>
	<!-- END: team -->
</tbody>
</table>
